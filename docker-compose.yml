name: "Python-App"
services:
  web:
    build: .
    expose:
      - "5000"
    develop:
      watch:
        - path: "."
          action: sync
          target: /app

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web